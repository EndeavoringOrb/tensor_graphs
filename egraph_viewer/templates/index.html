<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGraph Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="app-container">
        <!-- Left Panel: EClass Explorer -->
        <aside class="side-panel">
            <div class="panel-header">
                <div class="panel-header-row">
                    <h2>🔍 EGraph Explorer</h2>
                    <button id="settings-btn" class="settings-btn" title="Settings">⚙️</button>
                </div>
                <select id="file-select">
                    <option value="">-- Select File --</option>
                    {% for f in files %}
                    <option value="{{ f }}">{{ f }}</option>
                    {% endfor %}
                </select>
                <div id="file-info" class="file-info"></div>
            </div>

            <div class="legend">
                <span class="legend-item"><span class="dot eclass"></span> EClass</span>
                <span class="legend-item"><span class="dot eclass expanded"></span> Expanded</span>
                <span class="legend-item"><span class="dot enode"></span> ENode</span>
                <span class="legend-item"><span class="dot selected"></span> Selected</span>
            </div>

            <div id="breadcrumb" class="breadcrumb"></div>

            <div id="eclass-list" class="eclass-list">
                <p class="placeholder">Select a file to start exploring</p>
            </div>
        </aside>

        <!-- Right Panel: Graph Visualization -->
        <main class="main-panel">
            <div class="graph-header">
                <h2>📊 Graph View</h2>
                <div class="controls">
                    <button id="reset-btn">Reset</button>
                    <button id="zoom-in-btn">+ Zoom</button>
                    <button id="zoom-out-btn">− Zoom</button>
                </div>
            </div>

            <div id="graph-container" class="graph-container">
                <svg id="graph-svg"></svg>
                <div id="graph-empty" class="graph-empty">
                    <p>Select a file to begin<br>Click on eclass nodes to explore</p>
                </div>
            </div>

            <div id="selection-info" class="selection-info">
                <div>
                    <strong>Selections:</strong> <span id="selection-map-display">None</span>
                </div>
                <div id="visible-count" class="visible-count"></div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>⚙️ Settings</h3>
                <button id="settings-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="constant-limit-input">Constant Display Limit</label>
                    <p class="form-hint">Number of elements to show for each constant tensor</p>
                    <input type="number" id="constant-limit-input" min="1" max="1000" value="3">
                </div>
                <div id="settings-error" class="form-error"></div>
            </div>
            <div class="modal-footer">
                <button id="settings-cancel" class="btn btn-secondary">Cancel</button>
                <button id="settings-save" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/viewer.js') }}"></script>
</body>

</html>
