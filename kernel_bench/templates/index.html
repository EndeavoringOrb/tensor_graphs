<!-- File: kernel_bench/templates/index.html -->
<!DOCTYPE html>
<html>

<head>
    <title>Kernel Bench Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        canvas {
            max-width: 100%;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9em;
        }

        th,
        td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        .text-left {
            text-align: left;
        }

        .status-completed {
            color: green;
            font-weight: bold;
        }

        .status-failed {
            color: red;
            font-weight: bold;
        }

        .check {
            color: green;
            font-weight: bold;
        }

        .cross {
            color: red;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            font-family: monospace;
        }

        input,
        select {
            margin-bottom: 10px;
            padding: 5px;
        }

        button {
            padding: 10px 15px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .scores {
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Kernel Optimization Dashboard</h1>

        <canvas id="progressChart"></canvas>

        <h3>Submit Manual Kernel</h3>
        <input type="text" id="opname" placeholder="OpName (e.g. Dot_F32_3D_Optimized)">
        <select id="target_model">
            <option value="gemma-3-270m">gemma-3-270m</option>
            <option value="flux-klein-4b">flux-klein-4b</option>
        </select>
        <select id="backend">
            <option value="cpu">CPU</option>
            <option value="cuda">CUDA</option>
        </select><br>
        <textarea id="source" placeholder="#pragma once\n// Write C++ Kernel here..."></textarea><br>
        <button onclick="submitKernel()">Submit Kernel</button>
        <span id="submitMsg" style="margin-left: 10px; font-weight: bold;"></span>

        <h3>Job History</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th class="text-left">Time</th>
                    <th class="text-left">OpName</th>
                    <th>Model</th>
                    <th>Status</th>
                    <th>Compile</th>
                    <th>Test (No Rec)</th>
                    <th>Matched</th>
                    <th>Test (Rec)</th>
                    <th>Extracted</th>
                    <th>Bench Scores (ms)</th>
                    <th>Global Est. Time (ms)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function loadHistory() {
            const res = await fetch('/api/history');
            const data = await res.json();

            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = '';

            const chartLabels = [];
            const chartData = [];

            data.forEach(job => {
                const timeStr = new Date(job.started_at).toLocaleString();
                if (job.status === 'completed' && job.total_estimated_time_ms) {
                    chartLabels.push(timeStr);
                    chartData.push(job.total_estimated_time_ms);
                }

                const tr = document.createElement('tr');
                const getIcon = (cond) => cond ? '<span class="check">✔</span>' : '<span class="cross">✘</span>';
                const s = job.steps || {};
                const scores = (job.benchmark_scores || []).map(num => num.toFixed(3)).join(', ');

                tr.innerHTML = `
                <td class="text-left">${timeStr}</td>
                <td class="text-left">${job.opname}</td>
                <td>${job.target_model || '-'}</td>
                <td class="status-${job.status}">${job.status}</td>
                <td>${getIcon(s.compile && s.compile.exit_code === 0)}</td>
                <td>${getIcon(s.test_no_records && s.test_no_records.exit_code === 0)}</td>
                <td>${getIcon(s.matched)}</td>
                <td>${getIcon(s.test_records && s.test_records.exit_code === 0)}</td>
                <td>${getIcon(s.extracted)}</td>
                <td class="scores">${scores || '-'}</td>
                <td><strong>${job.total_estimated_time_ms ? job.total_estimated_time_ms.toFixed(2) : '-'}</strong></td>
                `;
                tbody.appendChild(tr);
            });

            const ctx = document.getElementById('progressChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Total Estimated Execution Time (ms)',
                        data: chartData,
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        tension: 0.1,
                        fill: true
                    }]
                },
                options: { scales: { y: { beginAtZero: false } } }
            });
        }

        async function submitKernel() {
            const source = document.getElementById('source').value;
            const opname = document.getElementById('opname').value;
            const backend = document.getElementById('backend').value;
            const target_model = document.getElementById('target_model').value;

            document.getElementById('submitMsg').innerText = "Submitting...";
            document.getElementById('submitMsg').style.color = "orange";

            const res = await fetch('/api/kernels/test', {
                method: 'POST',
                body: JSON.stringify({ source, opname, backend, target_model })
            });
            const data = await res.json();
            document.getElementById('submitMsg').innerText = "Queued: " + data.job_id;
            document.getElementById('submitMsg').style.color = "green";
            setTimeout(loadHistory, 3000);
        }

        loadHistory();
        setInterval(loadHistory, 10000); 
    </script>
</body>

</html>
